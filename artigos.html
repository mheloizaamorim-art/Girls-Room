    <!-- Primeiro: Artigos em Destaque -->
     <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">

    <!-- Anotação: a div com a classe "carrossel-card" foi criada com o objetivo de "enganar" o bootstrap, porque enquanto
    o template usado é apenas uma imagem, eu quero que o carrosel carregue outra informações, como o título, resumo
    autor, entre outros. 
    
    Lembrete: quando usar o Bootstrap, eu não posso separar as classes dele, por exemplo eu não poderia criar uma cascata com
    o carousel-inener -> carrosel-card(que foi a classe que eu inventei) -> carousel-item, busque sempre se lembrar que o Bootstrap
    é uma mãe ciumenta que não gosta que separe seus filhos.-->


<div class="carousel-item active">
  <div class="carrosel-card"> 
    <div class="row">    
      <!-- a coluna criada aqui vai ocupar 6 dos 12 quadradihos, ou seja, aqui eu estou fazendo a
      imagem ocupar 50% do espaço invés de ocupar todo o espaço, como anteriormente. -->

      <div class="col-md-6">  <!-- Coluna dedicada á imagem(50% da div) -->
        <img src="img/empreendedorismo feminino.jpg" class="d-block w-100" alt="...">
      </div>
      <div class="col-md-6 conteudo-card"> <!-- Coluna dedicada ao conteúdo, que farei em JSON -->
      </div>
    </div> </div> </div> 
    
    <div class="carousel-item">
  <div class="carrosel-card"> 
    <div class="row">    
      <div class="col-md-6">
        <img src="img/self care.jpg" class="d-block w-100" alt="...">
      </div>
      <div class="col-md-6 conteudo-card">

      </div>
    </div> </div> </div> 

    <div class="carousel-item">
  <div class="carrosel-card">

      <div class="col-md-6 conteudo-card">

      </div>
    </div> </div> </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">

</div> </div>
